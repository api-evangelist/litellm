naftiko: 1.0.0-alpha2
info:
  label: LiteLLM Proxy API
  description: 'LiteLLM Proxy API. 20 operations. Lead operation: Create an assistant. Self-contained Naftiko capability covering
    one Litellm business surface.'
  tags:
  - Litellm
  - LiteLLM Proxy API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
